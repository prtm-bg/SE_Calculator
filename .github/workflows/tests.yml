name: Run Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pytest pytest-cov

      - name: Run base calculator tests
        run: PYTHONPATH=. pytest test_calculator.py -v

      - name: Run binary module tests
        run: PYTHONPATH=. pytest tests/binary_tests.py -v

      - name: Coverage report
        run: PYTHONPATH=. pytest tests/binary_tests.py --cov=modules --cov-report=term-missing